<!DOCTYPE html>
<html>
<body>

<h2>Driver Registration Test</h2>

<button onclick="register()">Register Test Driver</button>

<pre id="result"></pre>

<script>
async function register() {

  const response = await fetch(
    "https://drivel-production.up.railway.app/api/trpc/driverRegister",
    {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        json: {
          email: "testdriver1@example.com",
          password: "Password123",
          name: "Test Driver",
          licenceNumber: "NZ123456",
          licenceClass: "1",
          licenceExpiry: "2030-01-01",
          vehicleRegistration: "ABC123",
          vehicleType: "Car",
          driverType: "small_passenger",
          tslNumber: "0342026",
          operatorName: "Test Operator"
        }
      })
    }
  );

  const data = await response.json();

  document.getElementById("result").textContent =
    JSON.stringify(data, null, 2);
}
</script>

</body>
</html>
