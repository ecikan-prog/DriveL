workflows:
  ios-workflow:
    name: DriveLegal iOS
    max_build_duration: 60
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: DriveLegal

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: app.drivelegal.mobile

      groups:
        - ios_credentials
        - drivelegal_env

      vars:
        XCODE_SCHEME: DriveLegal
        BUNDLE_ID: app.drivelegal.mobile

      node: 20.19.4
      xcode: latest
      cocoapods: default

    cache:
      cache_paths:
        - $CM_BUILD_DIR/DriveLegal/node_modules
        - $HOME/.pnpm-store

    - name: Install dependencies
  script: |
    cd DriveLegal
    corepack enable
    pnpm install --no-frozen-lockfile
    pnpm exec expo --version

- name: Fix Expo SDK packages
  script: |
    cd DriveLegal
    export CI=1
    pnpm exec expo install --fix
    pnpm exec expo install expo-router expo-audio expo-video expo-splash-screen expo-build-properties expo-location react-dom expo-asset expo-constants expo-linking react-native-safe-area-context react-native-screens react-native-reanimated react-native-worklets

- name: Check Expo
  script: |
    cd DriveLegal
    pnpm exec expo-doctor

      - name: Test iOS JavaScript bundle
        script: |
          cd DriveLegal
          export CI=1
          pnpm exec expo export --platform ios --clear --output-dir dist-ios-test

      - name: Expo prebuild iOS
        script: |
          cd DriveLegal
          export CI=1
          npx expo prebuild --platform ios --clean
      - name: Configure NODE_BINARY
        script: |
          cd DriveLegal
          echo "export NODE_BINARY=$(which node)" > ios/.xcode.env

      - name: Install CocoaPods
        script: |
          cd DriveLegal/ios
          pod install

           - name: Configure signing
        script: |
          keychain initialize
          keychain add-certificates
          xcode-project use-profiles

      - name: Build IPA
        script: |
          cd DriveLegal
          export NODE_BINARY="$(command -v node)"
          echo "Using Node: $NODE_BINARY"
          xcode-project build-ipa \
            --workspace "ios/DriveLegal.xcworkspace" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - DriveLegal/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true

      email:
        recipients:
          - e.cikan@icloud.com


  android-workflow:
    name: DriveLegal Android
    max_build_duration: 60
    instance_type: linux_x2

    environment:
      groups:
        - android_credentials
        - drivelegal_env

      node: 20.19.4

    cache:
      cache_paths:
        - $CM_BUILD_DIR/DriveLegal/node_modules
        - $HOME/.pnpm-store

    scripts:
      - name: Install dependencies
        script: |
          cd DriveLegal
          corepack enable
          pnpm install --no-frozen-lockfile

      - name: Fix Expo SDK packages
        script: |
          cd DriveLegal
          export CI=1
          npx expo install --fix

      - name: Check Expo
        script: |
          cd DriveLegal
          npx expo doctor

      - name: Expo prebuild Android
        script: |
          cd DriveLegal
          export CI=1
          npx expo prebuild --platform android --clean

      - name: Configure Android SDK
        script: |
          cd DriveLegal
          echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties

      - name: Build Android Bundle
        script: |
          cd DriveLegal/android
          ./gradlew bundleRelease

    artifacts:
      - DriveLegal/android/app/build/outputs/**/*.aab
      - DriveLegal/android/app/build/outputs/**/*.apk

    publishing:
      google_play:
        credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
        track: internal

      email:
        recipients:
          - e.cikan@icloud.com
